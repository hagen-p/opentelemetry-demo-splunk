name: Astronomy Shop - Promote

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote (e.g. 1.7.2)"
        required: true
      scope:
        description: "Scope (all | prod | diab)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - prod
          - diab
      dry_run:
        description: "Dry run (validate only, no copy to target repo)"
        required: false
        type: boolean
        default: false

jobs:
  promote:
    # Only run in the main splunk/opentelemetry-demo repo, not in forks
    if: github.repository == 'splunk/opentelemetry-demo'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v5

      - name: Check deploy token
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          DEPLOY_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "::error::GHCR_TOKEN secret is not configured. Please add it to repository secrets."
            echo "The token needs 'repo' scope to push to splunk/o11y-field-demos"
            exit 1
          fi
          echo "GHCR_TOKEN secret is configured"

      - name: Checkout target repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/checkout@v5
        with:
          repository: splunk/o11y-field-demos
          token: ${{ secrets.GHCR_TOKEN }}
          path: target

      - name: List available versions
        id: available
        run: |
          echo "### Available Versions in kubernetes/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract unique versions from filenames
          VERSIONS=$(ls kubernetes/splunk-astronomy-shop-*-values.yaml 2>/dev/null | \
            sed 's/.*splunk-astronomy-shop-\(.*\)-values\.yaml/\1/' | \
            sort -V | \
            uniq)

          if [ -z "$VERSIONS" ]; then
            echo "⚠️ No versions found with values.yaml files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Files in kubernetes/:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            ls -la kubernetes/ 2>/dev/null || echo "Directory not found"
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Version | Values | Manifest | DIAB |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|--------|----------|------|" >> $GITHUB_STEP_SUMMARY

            for V in $VERSIONS; do
              VALUES_OK="❌"
              MANIFEST_OK="❌"
              DIAB_OK="❌"

              [ -f "kubernetes/splunk-astronomy-shop-${V}-values.yaml" ] && VALUES_OK="✅"
              [ -f "kubernetes/splunk-astronomy-shop-${V}.yaml" ] && MANIFEST_OK="✅"
              [ -f "kubernetes/splunk-astronomy-shop-${V}-diab.yaml" ] && DIAB_OK="✅"

              echo "| \`${V}\` | ${VALUES_OK} | ${MANIFEST_OK} | ${DIAB_OK} |" >> $GITHUB_STEP_SUMMARY
            done
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Set variables
        id: vars
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SCOPE="${{ github.event.inputs.scope }}"

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SCOPE=${SCOPE}" >> $GITHUB_ENV

          # Source files (from kubernetes/)
          MANIFEST="kubernetes/splunk-astronomy-shop-${VERSION}.yaml"
          MANIFEST_DIAB="kubernetes/splunk-astronomy-shop-${VERSION}-diab.yaml"
          MANIFEST_LAMBDA="kubernetes/splunk-astronomy-shop-${VERSION}-lambda.yaml"
          MANIFEST_DC_SHIM="kubernetes/splunk-astronomy-shop-${VERSION}-dc-shim.yaml"
          VALUES="kubernetes/splunk-astronomy-shop-${VERSION}-values.yaml"

          echo "MANIFEST=${MANIFEST}" >> $GITHUB_ENV
          echo "MANIFEST_DIAB=${MANIFEST_DIAB}" >> $GITHUB_ENV
          echo "MANIFEST_LAMBDA=${MANIFEST_LAMBDA}" >> $GITHUB_ENV
          echo "MANIFEST_DC_SHIM=${MANIFEST_DC_SHIM}" >> $GITHUB_ENV
          echo "VALUES=${VALUES}" >> $GITHUB_ENV

          echo "### Selected Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | ${SCOPE} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Verify values.yaml exists (required)
        run: |
          echo "### Values File Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$VALUES" ]; then
            echo "✅ **Values file found:** \`$VALUES\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::Values file not found: $VALUES"
            echo "❌ **Values file NOT found:** \`$VALUES\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**The values.yaml file is required for promotion.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please ensure the file exists in \`kubernetes/\` before running this workflow." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Available files in kubernetes/:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            ls -la kubernetes/ 2>/dev/null || echo "Directory not found" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Verify manifest files exist
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Manifest Files Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          MISSING=0

          if [[ "$SCOPE" == "all" || "$SCOPE" == "prod" ]]; then
            if [ -f "$MANIFEST" ]; then
              echo "✅ PROD manifest: \`$MANIFEST\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ PROD manifest missing: \`$MANIFEST\`" >> $GITHUB_STEP_SUMMARY
              MISSING=1
            fi
          fi

          if [[ "$SCOPE" == "all" || "$SCOPE" == "diab" ]]; then
            if [ -f "$MANIFEST_DIAB" ]; then
              echo "✅ DIAB manifest: \`$MANIFEST_DIAB\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ DIAB manifest missing: \`$MANIFEST_DIAB\`" >> $GITHUB_STEP_SUMMARY
              MISSING=1
            fi
          fi

          # Lambda and dc-shim are optional
          if [ -f "$MANIFEST_LAMBDA" ]; then
            echo "✅ Lambda manifest: \`$MANIFEST_LAMBDA\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ Lambda manifest not found (optional): \`$MANIFEST_LAMBDA\`" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "$MANIFEST_DC_SHIM" ]; then
            echo "✅ DC-Shim manifest: \`$MANIFEST_DC_SHIM\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ DC-Shim manifest not found (optional): \`$MANIFEST_DC_SHIM\`" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $MISSING -eq 1 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "::error::Some manifest files are missing. Check kubernetes/ directory."
            echo "**Error:** Some manifest files are missing." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Available files in kubernetes/:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            ls -la kubernetes/ 2>/dev/null || echo "Directory not found"
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      # -----------------------------
      # PROD FLOW
      # -----------------------------
      - name: Copy PROD files
        if: (env.SCOPE == 'all' || env.SCOPE == 'prod') && github.event.inputs.dry_run != 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### PROD Deployment" >> $GITHUB_STEP_SUMMARY

          PROD_DIR="target/splunk-astronomy-shop/splunk-astronomy-demo-${VERSION}"
          LATEST_DIR="target/splunk-astronomy-shop/splunk-astronomy-demo-latest"

          mkdir -p "$PROD_DIR"

          # Copy all files into versioned directory
          cp "$MANIFEST" "$PROD_DIR/"
          cp "$VALUES" "$PROD_DIR/"
          [ -f "$MANIFEST_LAMBDA" ] && cp "$MANIFEST_LAMBDA" "$PROD_DIR/"
          [ -f "$MANIFEST_DC_SHIM" ] && cp "$MANIFEST_DC_SHIM" "$PROD_DIR/"

          echo "✅ Copied to \`$PROD_DIR/\`" >> $GITHUB_STEP_SUMMARY

          # Replace latest with a copy of the versioned directory
          rm -rf "$LATEST_DIR"
          cp -r "$PROD_DIR" "$LATEST_DIR"

          echo "✅ Updated \`splunk-astronomy-demo-latest/\`" >> $GITHUB_STEP_SUMMARY

      # -----------------------------
      # DIAB FLOW
      # -----------------------------
      - name: Copy DIAB files
        if: (env.SCOPE == 'all' || env.SCOPE == 'diab') && github.event.inputs.dry_run != 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### DIAB Deployment" >> $GITHUB_STEP_SUMMARY

          # --- V3 targets ---
          V3_DEPLOY_DIR="target/demo-in-a-box/v3/deployments/splunk-astronomy-demo-${VERSION}"
          V3_LATEST_DIR="target/demo-in-a-box/v3/deployments/splunk-astronomy-demo-latest"

          mkdir -p "$V3_DEPLOY_DIR"

          # Values stay in same location
          cp "$VALUES" target/demo-in-a-box/v3/opentelemetry-collector/
          cp "$VALUES" target/demo-in-a-box/v3/opentelemetry-collector/splunk-astronomy-shop-values-latest.yaml

          # Manifests into versioned directory
          cp "$MANIFEST_DIAB" "$V3_DEPLOY_DIR/"
          [ -f "$MANIFEST_LAMBDA" ] && cp "$MANIFEST_LAMBDA" "$V3_DEPLOY_DIR/"
          [ -f "$MANIFEST_DC_SHIM" ] && cp "$MANIFEST_DC_SHIM" "$V3_DEPLOY_DIR/"

          # Replace latest
          rm -rf "$V3_LATEST_DIR"
          cp -r "$V3_DEPLOY_DIR" "$V3_LATEST_DIR"

          echo "✅ Copied to \`target/demo-in-a-box/v3/\`" >> $GITHUB_STEP_SUMMARY

          # --- V4 targets ---
          V4_DEPLOY_DIR="target/demo-in-a-box/v4/demo-manifests/splunk-astronomy-demo-${VERSION}"
          V4_LATEST_DIR="target/demo-in-a-box/v4/demo-manifests/splunk-astronomy-demo-latest"

          mkdir -p "$V4_DEPLOY_DIR"
          mkdir -p target/demo-in-a-box/v4/collector

          # Values stay in same location
          cp "$VALUES" target/demo-in-a-box/v4/collector/splunk-astronomy-shop-latest-values.yaml

          # Manifests into versioned directory
          cp "$MANIFEST_DIAB" "$V4_DEPLOY_DIR/"
          [ -f "$MANIFEST_LAMBDA" ] && cp "$MANIFEST_LAMBDA" "$V4_DEPLOY_DIR/"
          [ -f "$MANIFEST_DC_SHIM" ] && cp "$MANIFEST_DC_SHIM" "$V4_DEPLOY_DIR/"

          # Replace latest
          rm -rf "$V4_LATEST_DIR"
          cp -r "$V4_DEPLOY_DIR" "$V4_LATEST_DIR"

          echo "✅ Copied to \`target/demo-in-a-box/v4/\`" >> $GITHUB_STEP_SUMMARY

      # -----------------------------
      # VERSION HISTORY + PROMOTED-VERSION
      # -----------------------------
      - name: Update version history and promoted version
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          NOW=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "| ${NOW} | ${VERSION} | ${SCOPE} |" >> target/splunk-astronomy-shop/VERSION-HISTORY.md

          # Update PROMOTED-VERSION in source repo
          echo "${VERSION}" > kubernetes/PROMOTED-VERSION

      - name: Commit promoted version to source repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/PROMOTED-VERSION
          if ! git diff --staged --quiet; then
            git commit -m "chore: update PROMOTED-VERSION to ${VERSION}"
            git push
          fi

      # -----------------------------
      # COMMIT + PUSH
      # -----------------------------
      - name: Commit & push changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --staged --quiet; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### No Changes" >> $GITHUB_STEP_SUMMARY
            echo "No changes to commit - files may already be up to date." >> $GITHUB_STEP_SUMMARY
          else
            git commit -m "Promote Astronomy Shop ${VERSION} (${SCOPE})" \
              -m "" \
              -m "Promoted from: splunk/opentelemetry-demo" \
              -m "Version: ${VERSION}" \
              -m "Scope: ${SCOPE}"
            git push

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ✅ Promotion Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Version **${VERSION}** promoted to splunk/o11y-field-demos" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🧪 Dry Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Validation passed. No files were copied (dry run mode)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To actually promote, run again with **Dry run** unchecked." >> $GITHUB_STEP_SUMMARY
