name: Remove TEST/BETA Manifests

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "CONFIRM" to remove all TEST and BETA manifest files'
        required: true
        type: string

jobs:
  remove-test-beta-files:
    # Only run in forks, not in the main splunk/opentelemetry-demo repo
    if: github.repository != 'splunk/opentelemetry-demo'
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "CONFIRM" ]; then
            echo "Confirmation failed. You must type 'CONFIRM' to proceed."
            exit 1
          fi
          echo "Confirmation received"

      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Find TEST and BETA manifest files
        id: find_files
        run: |
          echo "Looking for TEST and BETA manifest files..."
          FOUND="false"
          FILES=""

          # Find TEST-splunk* files in kubernetes/
          if ls kubernetes/TEST-splunk*.yaml 2>/dev/null; then
            FOUND="true"
            FILES="${FILES}$(ls kubernetes/TEST-splunk*.yaml 2>/dev/null)"$'\n'
          fi

          # Find BETA-splunk* files in kubernetes/
          if ls kubernetes/BETA-splunk*.yaml 2>/dev/null; then
            FOUND="true"
            FILES="${FILES}$(ls kubernetes/BETA-splunk*.yaml 2>/dev/null)"$'\n'
          fi

          # Find files in kubernetes/BETA/ directory
          if ls kubernetes/BETA/*.yaml 2>/dev/null; then
            FOUND="true"
            FILES="${FILES}$(ls kubernetes/BETA/*.yaml 2>/dev/null)"$'\n'
          fi

          echo "found=$FOUND" >> $GITHUB_OUTPUT
          if [ "$FOUND" = "true" ]; then
            echo "files<<EOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Remove TEST and BETA manifest files
        if: steps.find_files.outputs.found == 'true'
        run: |
          echo "Removing TEST and BETA manifest files:"
          rm -f kubernetes/TEST-splunk*.yaml
          rm -f kubernetes/BETA-splunk*.yaml
          rm -rf kubernetes/BETA/
          echo "TEST and BETA manifest files removed"

      - name: Commit and push changes
        if: steps.find_files.outputs.found == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add kubernetes/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: remove TEST/BETA manifest files" \
              -m "Automatically removed by remove-test-manifests workflow"
            git push
            echo "Changes committed and pushed"
          fi

      - name: Summary
        run: |
          if [ "${{ steps.find_files.outputs.found }}" == "true" ]; then
            echo "### TEST/BETA Manifest Cleanup Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Removed files:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.find_files.outputs.files }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### No TEST/BETA Manifest Files Found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No TEST or BETA manifest files were found in the repository." >> $GITHUB_STEP_SUMMARY
          fi
